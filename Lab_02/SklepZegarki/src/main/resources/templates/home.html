<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>MyShop</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}">
</head>
<body>
<header>
    <span class="title">MyShop</span>

    <a href="" class="cart-ico">
        <div>
            <span>Koszyk</span>
            <span>(0)</span>
            <span>0</span>
            <span>zł</span>
        </div>
    </a>
</header>

<div class="main-content">

    <div class="item" th:each="zegarek : ${items}">

        <p class="item-name" th:text="${zegarek.nazwa}">Nazwa Zegarka</p>

        <img th:src="@{${zegarek.fotoURL}}">

        <div>
            <span>Cena: </span>
            <span th:text="${zegarek.cena}">0.00</span>
            <span>zł</span>
        </div>

        <a href="" class="add-btn">Dodaj do koszyka</a>
    </div>

</div>

</body>
</html>
